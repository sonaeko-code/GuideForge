<!doctype html><html><head><meta charset="utf-8"><title>Type · Headings</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 24px 28px; }
  .row { display:grid; grid-template-columns: 1fr 110px; align-items:baseline; gap:14px; padding: 10px 0; border-bottom: 1px solid color-mix(in oklch, var(--brass-500) 14%, var(--border)); }
  .row:last-child { border: 0; }
  .l { color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); text-align: right; }
  .h1 { font-family: var(--font-serif); font-weight: 600; font-size: 44px; line-height: 1.05; letter-spacing: -0.02em; }
  .h2 { font-family: var(--font-serif); font-weight: 600; font-size: 32px; line-height: 1.1; letter-spacing: -0.015em; }
  .h3 { font-family: var(--font-serif); font-weight: 600; font-size: 22px; line-height: 1.2; letter-spacing: -0.01em; }
  .h4 { font-family: var(--font-sans); font-weight: 600; font-size: 16px; }
</style></head>
<body class="card">
  <div class="row"><span class="l h1">Forge structured guides</span><span class="meta">H1 · 44</span></div>
  <div class="row"><span class="l h2">Trusted knowledge networks</span><span class="meta">H2 · 32</span></div>
  <div class="row"><span class="l h3">From rough ideas to ship</span><span class="meta">H3 · 22</span></div>
  <div class="row"><span class="l h4">Network &middot; Hub &middot; Collection</span><span class="meta">H4 · 16</span></div>
</body></html>
