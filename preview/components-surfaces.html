<!doctype html><html><head><meta charset="utf-8"><title>Components · Surfaces</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .s { padding: 22px 18px; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; }
  .s.parchment { background:
      radial-gradient(ellipse at top left, color-mix(in oklch, var(--brass-500) 7%, transparent), transparent 55%),
      radial-gradient(ellipse at bottom right, color-mix(in oklch, var(--brass-700) 5%, transparent), transparent 60%),
      var(--gf-parchment); border-right: 1px solid color-mix(in oklch, var(--brass-500) 18%, var(--border)); }
  .s.ivory { background: var(--gf-soft-ivory); background-image: linear-gradient(180deg, color-mix(in oklch, var(--brass-50) 70%, var(--card)) 0%, var(--card) 100%); border-right: 1px solid color-mix(in oklch, var(--brass-500) 18%, var(--border)); }
  .s.graphite {
    background-color: oklch(0.22 0.014 55);
    background-image:
      radial-gradient(circle at 12% 18%, color-mix(in oklch, var(--brass-500) 22%, transparent), transparent 35%),
      radial-gradient(circle at 88% 82%, color-mix(in oklch, var(--brass-700) 15%, transparent), transparent 40%),
      linear-gradient(180deg, oklch(0.24 0.016 55) 0%, oklch(0.18 0.012 55) 100%);
    color: oklch(0.95 0.012 85);
  }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gf-copper); }
  .s.graphite .lbl { color: #E8C781; }
  h4 { font-family: var(--font-serif); font-weight: 600; font-size: 17px; margin: 8px 0 4px; color: inherit; }
  p { font-size: 12px; line-height: 1.5; color: var(--fg-3); margin: 0; }
  .s.graphite p { color: oklch(0.72 0.018 75); }
  .note { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-3); }
  .s.graphite .note { color: oklch(0.7 0.018 75); }
</style></head>
<body class="card">
  <div class="grid">
    <div class="s parchment">
      <div><span class="lbl">Parchment</span><h4>Page surface</h4><p>Warm cream with brass radial glows. The default canvas.</p></div>
      <div class="note">--background</div>
    </div>
    <div class="s ivory">
      <div><span class="lbl">Ivory</span><h4>Card surface</h4><p>One step lifted — cards, panels, popovers.</p></div>
      <div class="note">--card</div>
    </div>
    <div class="s graphite">
      <div><span class="lbl">Graphite</span><h4>Forged surface</h4><p>Selectively dark. Used for nav, dark mode, Forged badges.</p></div>
      <div class="note">oklch(.22 .014 55)</div>
    </div>
  </div>
</body></html>
