<!doctype html><html><head><meta charset="utf-8"><title>Type · Display Serif</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 24px 28px; }
  .row { display:grid; grid-template-columns: 1fr auto; align-items:end; gap:12px; }
  .display { font-family: var(--font-serif); font-weight: 600; font-size: 76px; line-height: .98; letter-spacing: -0.025em; color: var(--fg-1); margin:0; }
  .display em { font-style: italic; font-weight: 500; color: var(--gf-copper); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); }
  .stack { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-2); margin-top: 14px; padding-top: 12px; border-top: 1px solid color-mix(in oklch, var(--brass-500) 18%, var(--border)); }
  .pill { display:inline-block; padding:2px 8px; background:color-mix(in oklch, var(--brass-100) 80%, var(--card)); border:1px solid color-mix(in oklch, var(--brass-500) 30%, transparent); border-radius:6px; color: var(--brass-700); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body class="card">
  <div class="row">
    <h1 class="display">Build. <em>Organize.</em></h1>
    <span class="meta">600 · 76/74 · −2.5%</span>
  </div>
  <div class="stack">font-family: <strong>Fraunces</strong>, "Source Serif Pro", Georgia, serif &nbsp; <span class="pill">Display</span></div>
</body></html>
