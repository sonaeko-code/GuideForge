<!doctype html><html><head><meta charset="utf-8"><title>Type · Scale Specimen</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 22px 24px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 4px 8px 10px; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); font-weight: 500; border-bottom: 1px solid color-mix(in oklch, var(--brass-500) 16%, var(--border)); }
  td { padding: 9px 8px; border-bottom: 1px solid color-mix(in oklch, var(--brass-500) 10%, var(--border)); vertical-align: middle; }
  td:last-child { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-align: right; }
  td.glyph { color: var(--fg-1); font-family: var(--font-serif); }
  .sans { font-family: var(--font-sans) !important; font-weight: 400; }
  .name { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; color: var(--gf-copper); width: 90px; }
</style></head>
<body class="card">
  <table>
    <thead><tr><th>Token</th><th>Sample</th><th>Size · LH</th></tr></thead>
    <tbody>
      <tr><td class="name">display</td><td class="glyph" style="font-size:42px; font-weight:600; letter-spacing:-0.025em;">GuideForge</td><td>72 · 1.02</td></tr>
      <tr><td class="name">h1</td><td class="glyph" style="font-size:32px; font-weight:600; letter-spacing:-0.02em;">Forge it once.</td><td>44 · 1.05</td></tr>
      <tr><td class="name">h2</td><td class="glyph" style="font-size:24px; font-weight:600;">Network · Hub</td><td>32 · 1.10</td></tr>
      <tr><td class="name">h3</td><td class="glyph" style="font-size:18px; font-weight:600;">Section title</td><td>22 · 1.20</td></tr>
      <tr><td class="name">lede</td><td class="sans" style="font-size:16px; color:var(--fg-2);">A lede paragraph.</td><td>16 · 1.55</td></tr>
      <tr><td class="name">body</td><td class="sans" style="font-size:14px; color:var(--fg-2);">Body — readable at length.</td><td>14 · 1.55</td></tr>
      <tr><td class="name">small</td><td class="sans" style="font-size:12.5px; color:var(--fg-3);">Caption / meta</td><td>12.5 · 1.5</td></tr>
      <tr><td class="name">overline</td><td style="font-family: var(--font-mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg-3);">Patch 4.2 · May 15</td><td>10 · .18em</td></tr>
    </tbody>
  </table>
</body></html>
