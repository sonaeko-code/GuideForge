<!doctype html><html><head><meta charset="utf-8"><title>Components · Site Header</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 0; background: var(--gf-parchment); }
  .accent { height: 1px; background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--brass-500) 70%, transparent), transparent); }
  .header {
    height: 56px;
    background: color-mix(in oklch, var(--gf-soft-ivory) 80%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid color-mix(in oklch, var(--brass-500) 18%, var(--border));
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .seal {
    width: 32px; height: 32px; border-radius: 8px;
    background-image:
      radial-gradient(circle at 30% 25%, color-mix(in oklch, var(--brass-300) 70%, transparent), transparent 55%),
      linear-gradient(135deg, var(--brass-700) 0%, var(--brass-500) 50%, var(--brass-700) 100%);
    border: 1px solid color-mix(in oklch, var(--brass-900) 60%, transparent);
    box-shadow:
      inset 0 1px 0 0 color-mix(in oklch, var(--brass-300) 80%, transparent),
      inset 0 -1px 0 0 color-mix(in oklch, var(--brass-900) 50%, transparent),
      0 1px 2px rgba(0,0,0,.15);
    display: flex; align-items: center; justify-content: center;
    color: oklch(0.18 0.02 50);
  }
  .seal svg { width: 16px; height: 16px; }
  .wordmark { font-family: var(--font-sans); font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--gf-graphite); }
  .wordmark em { font-style: normal; color: var(--gf-copper); }
  nav { display: flex; gap: 24px; }
  nav a { font-family: var(--font-sans); font-size: 13.5px; color: var(--fg-3); text-decoration: none; position: relative; padding: 4px 0; }
  nav a.active { color: var(--fg-1); }
  nav a.active::after { content:""; position: absolute; left:0; right:0; bottom: -2px; height: 1px; background: var(--gf-copper); }
  .cta { display: flex; gap: 8px; align-items: center; }
  .ghost { background: transparent; border: 0; color: var(--fg-3); font-size: 13px; padding: 6px 10px; cursor: pointer; }
  .primary {
    height: 32px; padding: 0 14px; border-radius: 8px;
    background: var(--gf-copper); color: #fff; border: 0;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
  }
  .preview-frame { padding: 14px 18px 22px; }
  .demo { padding: 24px 20px; }
  .demo h1 { font-family: var(--font-serif); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px; color: var(--fg-1); }
  .demo p { font-size: 13.5px; line-height: 1.5; color: var(--fg-3); margin: 0; }
</style></head>
<body class="card">
  <div class="accent"></div>
  <div class="header">
    <div class="brand">
      <span class="seal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 L12 22"/><path d="M2 12 L22 12"/>
          <path d="M5.5 5.5 L18.5 18.5"/><path d="M18.5 5.5 L5.5 18.5"/>
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2 L10.5 6 L12 5.5 L13.5 6 Z" fill="currentColor"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
      </span>
      <span class="wordmark">Guide<em>Forge</em></span>
    </div>
    <nav>
      <a class="active">What it builds</a>
      <a>How it works</a>
      <a>Networks</a>
      <a>Trust</a>
    </nav>
    <div class="cta">
      <button class="ghost">Sign in</button>
      <button class="primary">Start building</button>
    </div>
  </div>
  <div class="demo">
    <h1>Site header — sticky, brass accent rail</h1>
    <p>Forge seal · wordmark with copper accent on “Forge” · underline-on-hover nav · single copper CTA.</p>
  </div>
</body></html>
