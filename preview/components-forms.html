<!doctype html><html><head><meta charset="utf-8"><title>Components · Forms</title>
<link rel="stylesheet" href="card.css">
<style>
  body.card { padding: 22px 26px; }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin: 0 0 14px; }
  .head .t { font-family: var(--font-serif); font-weight: 600; font-size: 18px; }
  .head .e { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gf-copper); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: var(--font-sans); font-size: 11.5px; font-weight: 500; color: var(--fg-2); letter-spacing: 0.02em; }
  input, select, textarea {
    font-family: var(--font-sans); font-size: 14px;
    padding: 8px 12px;
    background: var(--gf-soft-ivory);
    border: 1px solid color-mix(in oklch, var(--brass-500) 22%, var(--border));
    border-radius: 8px;
    color: var(--fg-1);
    outline: 0;
    transition: all 160ms;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gf-copper); box-shadow: 0 0 0 3px color-mix(in oklch, var(--gf-copper) 18%, transparent); }
  input::placeholder { color: var(--fg-3); }
  .hint { font-size: 11px; color: var(--fg-3); }
  .err { font-size: 11px; color: var(--gf-rust); }
  input.error { border-color: var(--gf-rust); box-shadow: 0 0 0 3px color-mix(in oklch, var(--gf-rust) 14%, transparent); }
  .check { display:inline-flex; align-items:center; gap: 8px; font-size: 13px; color: var(--fg-2); }
  .check input { appearance: none; width:16px; height:16px; border-radius:4px; border: 1.5px solid color-mix(in oklch, var(--brass-500) 35%, var(--border)); padding:0; margin:0; position: relative; cursor: pointer; background: var(--gf-soft-ivory); }
  .check input:checked { background: var(--gf-copper); border-color: var(--gf-copper); }
  .check input:checked::after { content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size: 11px; }
</style></head>
<body class="card">
  <div class="head"><div class="t">Form Inputs</div><div class="e">Text · Select · Check</div></div>
  <div class="grid">
    <div class="field">
      <label>Network name</label>
      <input value="QuestLine" />
      <span class="hint">Shown in headers and breadcrumbs.</span>
    </div>
    <div class="field">
      <label>Direction</label>
      <select><option>Gaming</option><option>Repair</option><option>SOP</option></select>
      <span class="hint">Picks the right Forge Rules.</span>
    </div>
    <div class="field">
      <label>Slug</label>
      <input value="" placeholder="questline" />
      <span class="err">Required — used in the public URL.</span>
    </div>
    <div class="field">
      <label>Visibility</label>
      <div style="display:flex; flex-direction:column; gap:6px; padding-top:4px;">
        <span class="check"><input type="checkbox" checked> Public network</span>
        <span class="check"><input type="checkbox"> Require Forge Rules pass</span>
      </div>
    </div>
  </div>
</body></html>
